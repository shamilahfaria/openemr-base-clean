# Week 2 golden set — 50 cases across the 5 boolean rubric categories.
# Each case exercises exactly one category. `ingest` cases hit POST /documents
# with a stubbed vision result; `ask` cases ingest then hit POST /ask (the
# multi-agent graph: intake -> hybrid-RAG evidence -> answer). Fixtures are the
# drafts the stubbed model returns; doc_type selects lab_pdf vs intake_form.
#
# PHI probes use verbatim quote/value strings (not bare short numbers) so a
# latency or count in a log line can never false-positive the checker.

fixtures:
  # --- lab_pdf drafts ---
  a1c_high:
    collection_date: "2026-07-01"
    results:
      - test_name: "Hemoglobin A1c"
        value: "6.7"
        unit: "%"
        reference_range: "4.0-5.6"
        abnormal_flag: high
        confidence: high
        page: 1
        quote: "A1c 6.7 %"
        bbox: {page: 1, x0: 0.10, y0: 0.20, x1: 0.40, y1: 0.25}
      - test_name: "LDL Cholesterol"
        value: "160"
        unit: "mg/dL"
        reference_range: "<100"
        abnormal_flag: high
        confidence: high
        page: 1
        quote: "LDL 160 mg/dL"
        bbox: {page: 1, x0: 0.10, y0: 0.30, x1: 0.40, y1: 0.35}
  ungrounded:
    results:
      - test_name: "TSH"
        value: null
        confidence: low
        abnormal_flag: unknown
        page: 1
        quote: null
  empty:
    results: []
  cbc_anemia:
    collection_date: "2026-06-28"
    results:
      - test_name: "Hemoglobin"
        value: "9.8"
        unit: "g/dL"
        reference_range: "13.5-17.5"
        abnormal_flag: low
        confidence: high
        page: 1
        quote: "Hgb 9.8 g/dL (L)"
      - test_name: "Ferritin"
        value: "11"
        unit: "ng/mL"
        reference_range: "30-400"
        abnormal_flag: low
        confidence: high
        page: 1
        quote: "Ferritin 11 ng/mL (L)"
  potassium_high:
    collection_date: "2026-07-03"
