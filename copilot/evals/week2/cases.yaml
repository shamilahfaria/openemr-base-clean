        reference_range: "<100"
        abnormal_flag: high
        confidence: high
        page: 1
        quote: "LDL-C 175 mg/dL (H)"
      - test_name: "HDL Cholesterol"
        value: "38"
        unit: "mg/dL"
        reference_range: ">40"
        abnormal_flag: low
        confidence: high
        page: 1
        quote: "HDL-C 38 mg/dL (L)"
  glucose_low:
    collection_date: "2026-07-05"
    results:
      - test_name: "Glucose"
        value: "54"
        unit: "mg/dL"
        reference_range: "70-99"
        abnormal_flag: low
        confidence: high
        page: 1
        quote: "Glucose 54 mg/dL (L)"
  normal_bmp:
    collection_date: "2026-07-04"
    results:
      - test_name: "Sodium"
        value: "140"
