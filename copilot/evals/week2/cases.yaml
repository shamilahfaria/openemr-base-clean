    doc_type: intake_form
    patient_id: eval-p4
    fixture: intake_basic
    question: "Does this patient have any allergies?"
    phi_values: ["penicillin — rash", "PCN (rash)"]
  - id: P5-critical-lab-no-phi-in-logs
