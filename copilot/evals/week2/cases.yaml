      - test_name: "Potassium"
        value: "6.1"
        unit: "mmol/L"
        reference_range: "3.5-5.0"
        abnormal_flag: critical
        confidence: high
        page: 1
        quote: "K 6.1 mmol/L (CRIT)"
  tsh_high:
    collection_date: "2026-07-02"
    results:
      - test_name: "TSH"
        value: "12.4"
